# =============================================================================
# ZenGate AI — Docker Compose (Development)
# Runs the full local development stack.
# =============================================================================

services:
  # --- ZenGate Gateway ---
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ZENGATE_PORT: "8080"
      ZENGATE_ENV: "development"
      ZENGATE_UPSTREAM_URL: "http://echo:9090"
      ZENGATE_RATELIMIT_ENABLED: "false"
      ZENGATE_REDIS_URL: "redis://redis:6379"
    depends_on:
      - echo
      - redis
    restart: unless-stopped
    networks:
      - zengate

  # --- Echo Server (mock upstream for development) ---
  echo:
    image: hashicorp/http-echo:latest
    command: ["-text=Hello from ZenGate upstream! 🚀", "-listen=:9090"]
    ports:
      - "9090:9090"
    networks:
      - zengate

  # --- Redis (rate limiting + streams) ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - zengate

  # --- Prometheus (metrics scraping) ---
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - zengate

  # --- Grafana (dashboards) ---
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: zengate
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - zengate

volumes:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  zengate:
    driver: bridge
